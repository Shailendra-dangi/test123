    <script>
    let age = 5;
    let grace = 2;

    if((age+grace)>18){
        console.log("You can drive");
    }

    else{
        console.log("You cannot drive");
    }
    
    console.log(age + grace)
    console.log(age - grace)

    console.log(age % grace)
    console.log(age ** grace)
    </script>
